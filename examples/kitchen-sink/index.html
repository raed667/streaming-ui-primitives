<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>streaming-ui-primitives — Kitchen Sink</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, sans-serif; background: #f5f5f5; }
      .markdown-output h1, .markdown-output h2, .markdown-output h3 { margin: 0.5em 0; }
      .markdown-output p { margin: 0.4em 0; }
      .markdown-output ul, .markdown-output ol { margin: 0.4em 0; padding-left: 1.4em; }
      .markdown-output code { background: #f3f4f6; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }
      .markdown-output pre { background: #1e1e2e; color: #cdd6f4; padding: 10px 14px; border-radius: 8px; overflow-x: auto; }
      .markdown-output pre code { background: none; padding: 0; }
